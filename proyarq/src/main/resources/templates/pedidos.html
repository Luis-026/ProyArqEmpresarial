<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos - Plaza Vea</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/style.css}" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="pedidos-body">

  <aside class="sidebar">
    <div class="logo"><img th:src="@{/images/PlazaVeaLogo.png}" alt="Plaza Vea" class="logo-img"></div>

    <nav class="nav flex-column">
      <a th:if="${usuarioRol != null and #strings.equalsIgnoreCase(usuarioRol, 'Administrador')}"
         th:href="@{/dashboard}" class="nav-link">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </a>

      <a th:if="${usuarioRol != null and (#strings.equalsIgnoreCase(usuarioRol, 'Administrador') or #strings.equalsIgnoreCase(usuarioRol, 'Jefe de Tienda'))}"
         th:href="@{/inventario}" class="nav-link">
        <i class="fa-solid fa-boxes-stacked"></i> Inventario
      </a>

      <a th:if="${usuarioRol != null and (#strings.equalsIgnoreCase(usuarioRol, 'Administrador') or #strings.equalsIgnoreCase(usuarioRol, 'Operario'))}"
         th:href="@{/pedidos}" class="nav-link active">
        <i class="fa-solid fa-cart-shopping"></i> Pedidos
      </a>

      <a th:if="${usuarioRol != null and (#strings.equalsIgnoreCase(usuarioRol, 'Administrador') or #strings.equalsIgnoreCase(usuarioRol, 'Jefe de Tienda'))}"
         th:href="@{/operarios}" class="nav-link">
        <i class="fa-solid fa-users"></i> Operarios
      </a>

      <a th:if="${usuarioRol != null and (#strings.equalsIgnoreCase(usuarioRol, 'Administrador') or #strings.equalsIgnoreCase(usuarioRol, 'Jefe de Tienda'))}"
         th:href="@{/reportes}" class="nav-link">
        <i class="fa-solid fa-chart-pie"></i> Reportes
      </a>
    </nav>

    <a th:href="@{/logout}" class="btn btn-outline-danger logout">
      <i class="fa-solid fa-right-from-bracket"></i>
      Cerrar sesión
    </a>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>Pedidos</h1>
        <p>Monitorea el estado de todos los pedidos</p>
      </div>

      <div class="top-actions">
        <select>
          <option>Todos los canales</option>
          <option>Web</option>
          <option>App móvil</option>
          <option>Tienda física</option>
        </select>

        <button class="btn btn-outline-secondary date-btn">
          <i class="fa-regular fa-calendar-days"></i>
          Hoy
        </button>

        <button class="btn btn-primary new-btn" type="button" onclick="abrirPedidoModal()">
          <i class="fa-solid fa-plus"></i>
          Nuevo pedido
        </button>
      </div>

      <div class="user-card">
        <i class="fa-solid fa-user"></i>
        <span id="usuarioNombre"></span>
      </div>
    </header>

    <section class="kanban">

      <div class="column pending">
        <h2>Pendiente</h2>
        <span class="count" id="pendingCount">(0)</span>
        <div id="pendingOrders"></div>
      </div>

      <div class="column preparing">
        <h2>En preparación</h2>
        <span class="count" id="preparingCount">(0)</span>
        <div id="preparingOrders"></div>
      </div>

      <div class="column dispatched">
        <h2>Despachado</h2>
        <span class="count" id="dispatchedCount">(0)</span>
        <div id="dispatchedOrders"></div>
      </div>

      <div class="column delivered">
        <h2>Entregado</h2>
        <span class="count" id="deliveredCount">(0)</span>
        <div id="deliveredOrders"></div>
      </div>

    </section>

    <section class="table-panel">
      <h2>Pedidos recientes</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Cliente</th>
              <th>Total</th>
              <th>Canal</th>
              <th>Estado</th>
              <th>Operario</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
    </section>

  </main>

  <div class="modal" id="pedidoModal">
    <div class="modal-content">
      <button class="btn btn-light close-modal" onclick="cerrarPedidoModal()">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <h2 id="pedidoModalTitle">Agregar pedido</h2>

      <input type="hidden" id="pedidoId">
      <input type="text" id="newOrderCode" placeholder="Código de pedido">
      <input type="text" id="newOrderClient" placeholder="Nombre del cliente">
      <input type="number" id="newOrderTotal" placeholder="Total de productos">
      <input type="datetime-local" id="newOrderDate" placeholder="Fecha de pedido">

      <select id="newOrderStatus">
        <option value="">Seleccionar estado</option>
        <option value="Pendiente">Pendiente</option>
        <option value="En preparación">En preparación</option>
        <option value="Despachado">Despachado</option>
        <option value="Entregado">Entregado</option>
      </select>

      <select id="newOrderChannel">
        <option value="">Seleccionar canal</option>
        <option value="Web">Web</option>
        <option value="App móvil">App móvil</option>
        <option value="Tienda física">Tienda física</option>
      </select>

      <select id="newOrderOperario"></select>

      <button class="btn btn-primary btn-save" id="saveOrderBtn" type="button" onclick="agregarPedido()">Guardar pedido</button>
    </div>
  </div>

  <script th:src="@{/script.js}"></script>
</body>
</html>
